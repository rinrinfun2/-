<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 10px; }
        input { width: 80%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #results { margin-top: 15px; }
        .item { margin-bottom: 10px; border-bottom: 1px dotted #ccc; padding-bottom: 5px; }
        a { color: #1a73e8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <input type="text" id="searchInput" placeholder="サイト内を検索...">
    <div id="results"></div>

    <script>
        const gasUrl = 'https://script.google.com/a/macros/seirinkan.ed.jp/s/AKfycby3gnsjIevJiZL3rktzbFHNqeDAdRsATJaGMASBNN-_oVMxO6mKURYjuaKk6prYNxSg/exec';
        let searchData = [];

       
        fetch(gasUrl)
            .then(res => res.json())
            .then(data => searchData = data);

       
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (query === '') return;

            const filtered = searchData.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.keyword.toLowerCase().includes(query)
            );

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<a href="${item.url}" target="_top">${item.title}</a>`;
                resultsDiv.appendChild(div);
            });
        });
    </script>
</body>
</html>
